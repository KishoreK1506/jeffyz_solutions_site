name: Build & Deploy to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Multi-Arch Image
        run: |
          echo "DockerHub user=${{ secrets.DOCKERHUB_USERNAME }}"
          docker buildx ls
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/jeffyz-site:latest \
            --push .

      - name: Deploy on EC2 (pull + restart)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            sudo docker rm -f $(sudo docker ps -q) || true
            sudo docker pull docker.io/${{ secrets.DOCKERHUB_USERNAME }}/jeffyz-site:latest
            sudo docker run -d -p 80:80 docker.io/${{ secrets.DOCKERHUB_USERNAME }}/jeffyz-site:latest

